name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release

      - name: Package
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME}
          ARCHIVE="wattson-${TAG}-${{ matrix.target }}.tar.gz"
          tar czf "${ARCHIVE}" -C target/release wattson
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: wattson-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true

  update-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.UPDATE_HOMEBREW_TAP == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --pattern "*.tar.gz" \
            --dir artifacts/

      - name: Compute SHA256s and render formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          TAG=${GITHUB_REF_NAME}

          SHA_X86_MACOS=$(sha256sum "artifacts/wattson-${TAG}-x86_64-apple-darwin.tar.gz"       | cut -d' ' -f1)
          SHA_ARM_MACOS=$(sha256sum "artifacts/wattson-${TAG}-aarch64-apple-darwin.tar.gz"      | cut -d' ' -f1)
          SHA_X86_LINUX=$(sha256sum "artifacts/wattson-${TAG}-x86_64-unknown-linux-gnu.tar.gz"  | cut -d' ' -f1)
          SHA_ARM_LINUX=$(sha256sum "artifacts/wattson-${TAG}-aarch64-unknown-linux-gnu.tar.gz" | cut -d' ' -f1)

          sed \
            -e "s/__VERSION__/${VERSION}/g" \
            -e "s/__SHA256_X86_MACOS__/${SHA_X86_MACOS}/g" \
            -e "s/__SHA256_ARM_MACOS__/${SHA_ARM_MACOS}/g" \
            -e "s/__SHA256_X86_LINUX__/${SHA_X86_LINUX}/g" \
            -e "s/__SHA256_ARM_LINUX__/${SHA_ARM_LINUX}/g" \
            Formula/wattson.rb > rendered_formula.rb

      - name: Push to tap repo
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/berg/homebrew-wattson.git" tap
          mkdir -p tap/Formula
          cp rendered_formula.rb tap/Formula/wattson.rb
          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/wattson.rb
          git commit -m "wattson ${VERSION}"
          git push
